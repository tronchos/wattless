name: wattless-prod

services:
  server:
    build:
      context: ..
      dockerfile: docker/server.prod.Dockerfile
    environment:
      PORT: 8080
      CLIENT_ORIGIN: ${APP_BASE_URL:-http://localhost:3000}
      BROWSER_BIN: /usr/bin/chromium
      AI_PROVIDER: ${AI_PROVIDER:-rule_based}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-12s}
      REQUEST_TIMEOUT: ${REQUEST_TIMEOUT:-20s}
      NAVIGATION_TIMEOUT: ${NAVIGATION_TIMEOUT:-15s}
      NETWORK_IDLE_WAIT: ${NETWORK_IDLE_WAIT:-1500ms}
      GREENCHECK_BASE_URL: ${GREENCHECK_BASE_URL:-https://api.thegreenwebfoundation.org/api/v3/greencheck}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  client:
    build:
      context: ..
      dockerfile: docker/client.prod.Dockerfile
    environment:
      PORT: 3000
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      SCANNER_API_URL: http://server:8080
      SCANNER_SELF_BASE_URL: http://client:3000
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${CLIENT_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/healthz').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
