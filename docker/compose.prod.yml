name: wattless-unified

secrets:
  gemini_api_key:
    file: ${GEMINI_API_KEY_FILE:-/dev/null}

services:
  wattless:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 8080
      BROWSER_BIN: /usr/bin/chromium
      AI_PROVIDER: ${AI_PROVIDER:-rule_based}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_API_KEY_FILE: /run/secrets/gemini_api_key
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-12s}
      REQUEST_TIMEOUT: ${REQUEST_TIMEOUT:-20s}
      NAVIGATION_TIMEOUT: ${NAVIGATION_TIMEOUT:-15s}
      NETWORK_IDLE_WAIT: ${NETWORK_IDLE_WAIT:-1500ms}
      GREENCHECK_BASE_URL: ${GREENCHECK_BASE_URL:-https://api.thegreenwebfoundation.org/api/v3/greencheck}
    secrets:
      - gemini_api_key
    mem_limit: 2g
    cpus: 2.0
    ports:
      - "${PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
