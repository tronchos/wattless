name: wattless-vite

services:
  server:
    build:
      context: ..
      dockerfile: docker/server.Dockerfile
    environment:
      PORT: 8080
      CLIENT_ORIGIN: http://localhost:5173
      BROWSER_BIN: /usr/bin/chromium
      REQUEST_TIMEOUT: ${REQUEST_TIMEOUT:-60s}
      AI_PROVIDER: ${AI_PROVIDER:-rule_based}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-12s}
    ports:
      - "${SERVER_PORT:-18080}:8080"
    volumes:
      - ../server:/app

  client:
    build:
      context: ..
      dockerfile: docker/client-vite.Dockerfile
    environment:
      VITE_PROXY_TARGET: http://server:8080
    ports:
      - "5173:5173"
    volumes:
      - ../client:/app
      - /app/node_modules
    depends_on:
      - server
