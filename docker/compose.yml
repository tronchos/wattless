name: wattless

services:
  server:
    build:
      context: ..
      dockerfile: docker/server.Dockerfile
    environment:
      PORT: 8080
      CLIENT_ORIGIN: http://localhost:${CLIENT_PORT:-3000}
      BROWSER_BIN: /usr/bin/chromium
    ports:
      - "${SERVER_PORT:-18080}:8080"
    volumes:
      - ../server:/app

  client:
    build:
      context: ..
      dockerfile: docker/client.Dockerfile
    environment:
      APP_BASE_URL: http://localhost:${CLIENT_PORT:-3000}
      SCANNER_API_URL: http://server:8080
      SCANNER_SELF_BASE_URL: http://client:3000
    ports:
      - "${CLIENT_PORT:-3000}:3000"
    volumes:
      - ../client:/app
      - /app/node_modules
    depends_on:
      - server
